<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>התראות על שיגורים לפני כולם</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
direction:rtl;
height:100vh;
display:flex;
align-items:center;
justify-content:center;

/* רקע אדום בולט */
background:linear-gradient(135deg, #d31027, #ea384d);
}

.container{
text-align:center;
padding:30px 25px;
max-width:500px;
width:90%;
background:rgba(255,255,255,0.95); /* רקע לבן כמעט אטום כדי להבליט את הטקסט */
border-radius:20px;
box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h1{
font-size:28px;
margin-bottom:15px;
color:#d31027; /* כותרת באדום תואם לרקע */
font-weight:bold;
}

p{
font-size:18px;
margin-bottom:30px;
color:#333;
}

.button{
display:inline-flex; /* מאפשר יישור קל של האייקון והטקסט */
align-items:center;
justify-content:center;
gap:12px; /* רווח בין האייקון לטקסט */
margin:0 auto;
padding:16px 35px;
font-size:20px;
background:#25D366; /* ירוק וואטסאפ */
color:white;
border-radius:50px; /* פינות עגולות לחלוטין */
text-decoration:none;
font-weight:bold;
box-shadow:0 4px 15px rgba(37,211,102,0.4);
transition:0.3s;
animation: whatsappPulse 1.5s infinite; /* הפעלת האנימציה */
}

.button:hover{
transform:scale(1.05);
background:#20b958; /* ירוק מעט כהה יותר במעבר עכבר */
}

.whatsapp-icon{
width:26px;
height:26px;
fill:currentColor; /* לוקח את הצבע הלבן של הטקסט */
}

/* אנימציית פעימה (Pulse) מותאמת לוואטסאפ */
@keyframes whatsappPulse {
    0% {
        box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7);
    }
    70% {
        box-shadow: 0 0 0 15px rgba(37, 211, 102, 0);
    }
    100% {
        box-shadow: 0 0 0 0 rgba(37, 211, 102, 0);
    }
}

@media (min-width:768px){
    h1{font-size:36px;}
    p{font-size:20px;}
    .button{font-size:22px;}
    .whatsapp-icon{width:30px; height:30px;}
}

</style>
</head>

<body>

<div class="container">
    <h1>קבלו התראה לפני כולם 🚨</h1>
    <p>מערכת חכמה שמעדכנת אותך מיד כשיש שיגור — אל תישאר מאחור</p>
    <a href="https://chat.whatsapp.com/DugOXyPYnfBEKEYQeI60el" class="button">
        <svg class="whatsapp-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
            <path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zM223.9 414.6c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 334.1l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.6-186.6 184.6zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-32.6-16.3-54-29.1-75.5-66-5.7-9.8 5.7-9.1 16.3-30.3 1.8-3.7 .9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 35.2 15.2 49 16.5 66.6 13.9 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/>
        </svg>
        הצטרף עכשיו לוואטסאפ
    </a>
</div>

</body>
</html>
